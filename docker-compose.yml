services:
  n8n:
    image: n8nio/n8n:latest
    container_name: cerebro-n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_LOG_LEVEL=info
      - N8N_SECURE_COOKIE=false
    volumes:
      - n8n_data:/home/node/.n8n
      - ./workspace:/workspace

  qdrant:
    image: qdrant/qdrant:latest
    container_name: cerebro-memory
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  n8n_data:
  qdrant_data:
